services:
  - type: web
    name: runalert-web
    runtime: node
    plan: starter
    buildCommand: npm ci && npm --prefix dashboard ci && npm --prefix dashboard run build
    startCommand: npm run start:web
    healthCheckPath: /health
    branch: main
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 24.17.0
      - key: TWITCH_CLIENT_ID
        sync: false
      - key: TWITCH_CLIENT_SECRET
        sync: false
      - key: RUNALERT_CONFIG_STORE
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RUNALERT_CREDENTIAL_PEPPER
        sync: false
      - key: VITE_POSTHOG_KEY
        sync: false
      - key: VITE_POSTHOG_HOST
        sync: false
      - key: RUNALERT_MAC_DMG_URL
        sync: false
      - key: RUNALERT_MAC_ZIP_URL
        sync: false
      - key: RUNALERT_WINDOWS_STORE_URL
        sync: false
      - key: RUNALERT_RELEASE_PUBLISHED_AT
        sync: false
