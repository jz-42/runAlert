name: Feature request
description: Suggest a focused improvement to runAlert
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user need is not met today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed outcome
      description: Describe the behavior, not only the implementation.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives and tradeoffs
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: I checked for an existing issue covering this request.
          required: true
