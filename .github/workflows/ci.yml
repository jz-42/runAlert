name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            dashboard/package-lock.json

      - name: Install backend deps
        run: npm ci

      - name: Backend tests
        run: npm test

      - name: Scan current tree and full history for secrets
        run: npm run scan:secrets

      - name: Install dashboard deps
        run: npm ci
        working-directory: dashboard

      - name: Dashboard tests
        run: npm test
        working-directory: dashboard

      - name: Lint dashboard
        run: npm run lint
        working-directory: dashboard

      - name: Build dashboard
        run: npm run build
        working-directory: dashboard

      - name: Audit production dependencies
        run: npm run audit:production

      - name: Install Playwright browsers (Chromium + Firefox)
        run: npx playwright install --with-deps chromium firefox
        working-directory: dashboard

      - name: Dashboard layout invariants (Playwright)
        run: npm run test:layout
        working-directory: dashboard

      - name: Dashboard accessibility (Playwright + axe)
        run: npm run test:a11y
        working-directory: dashboard

      - name: Upload Playwright artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-playwright-artifacts
          path: |
            dashboard/test-results
            dashboard/playwright-report

  visual:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
        working-directory: dashboard
      - run: npx playwright install chromium
        working-directory: dashboard
      - name: Deterministic Mac visual regression
        run: npm run test:visual
        working-directory: dashboard
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: dashboard-visual-diff
          path: dashboard/test-results
